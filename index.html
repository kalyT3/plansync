const STORAGE_KEY = “plansync-ctx-v2”;

function loadCtx() {
try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
function saveCtx(f) {
try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ groupNum:f.groupNum, school:f.school, period:f.period, extra:f.extra })); } catch {}
}

const LOADER_MSGS = [
“🔍 Lecture de l’image…”,
“🧠 Identification des créneaux horaires…”,
“📋 Extraction des cours, TD et lieux…”,
“🗓️ Mise en forme des événements…”,
“✨ Finalisation…”,
];

function buildPrompt({ startDate, period, groupNum, school, extra }) {
return `Tu es un assistant expert en lecture d’emplois du temps universitaires et hospitaliers français (AP-HP, IFSI, fac de médecine).
Analyse l’image et retourne UNIQUEMENT un JSON valide, sans texte autour, sans backticks.
Format: {“events”:[{“title”:”…”,“type”:“CM|TD|Suivi|Examen|Travail”,“date”:“YYYY-MM-DD”,“startTime”:“HH:MM”,“endTime”:“HH:MM”,“location”:”…”,“description”:”…”}]}
RÈGLES:

1. GROUPES: ${groupNum ? `Utilisateur = groupe "${groupNum}". Inclure événements pour tous + événements listant "${groupNum}". Exclure autres groupes. Prendre la salle de "${groupNum}".` : “Inclure tous les événements.”}
1. TYPES: distingue bien CM (Cours Magistral), TD (Travaux Dirigés), Suivi (suivi pédagogique), Examen (partiel/DS), Travail (stage/garde).
1. HORAIRES: lire les en-têtes de colonnes. Format “09:00”,“10:30”,“12:45”.
1. DATES: ${startDate ? `Semaine commence le ${startDate}. Lundi=J, Mardi=J+1, Mercredi=J+2, Jeudi=J+3, Vendredi=J+4.` : `Lire les dates dans l'image (ex "16 mars 2026" → "2026-03-16").`}
1. Intitulé complet dans title. Prof + UE dans description.
   ${period ? `Période: ${period}.` : “”}${school ? ` Etablissement: ${school}.` : “”}${extra ? ` Contexte: ${extra}` : “”}`;
   }

function generateICS(events) {
const lines = [“BEGIN:VCALENDAR”,“VERSION:2.0”,“PRODID:-//PlanSync//FR”,“CALSCALE:GREGORIAN”,“METHOD:PUBLISH”];
events.forEach((ev, i) => {
const uid = `ps-${Date.now()}-${i}`;
const stamp = new Date().toISOString().replace(/[-:.]/g,””).slice(0,15)+“Z”;
const dt = (d,t) => d&&t ? d.replace(/-/g,””)+“T”+t.replace(”:”,””)+“00” : null;
const s = dt(ev.date, ev.startTime), e = dt(ev.date, ev.endTime)||s;
if (!s) return;
lines.push(“BEGIN:VEVENT”,`UID:${uid}`,`DTSTAMP:${stamp}`,`SUMMARY:${ev.title}`,`DTSTART:${s}`,`DTEND:${e}`);
if (ev.location) lines.push(`LOCATION:${ev.location}`);
if (ev.description) lines.push(`DESCRIPTION:${ev.description}`);
lines.push(“END:VEVENT”);
});
lines.push(“END:VCALENDAR”);
return lines.join(”\r\n”);
}

style={{width:“100%”,background:P.offwhite,border:`1.5px solid ${P.border}`,borderRadius:8,padding:“9px 12px”,color:P.textDark,fontSize:“0.83rem”,outline:“none”,minHeight:64,resize:“vertical”}}/>

{[“Télécharge le fichier .ics via le bouton ci-dessous.”,

// ─── MAIN APP ──────────────────────────────────────────────────────────────
function PlanSync() {
const [step, setStep] = useState(1);
const [img64, setImg64] = useState(null);
const [imgMime, setImgMime] = useState(“image/jpeg”);
const [preview, setPreview] = useState(null);
const [drag, setDrag] = useState(false);
const [form, setForm] = useState({startDate:””,period:””,groupNum:””,school:””,extra:””});
const [savedCtx, setSavedCtx] = useState(null);
const [loading, setLoading] = useState(false);
const [lMsg, setLMsg] = useState(LOADER_MSGS[0]);
const [events, setEvents] = useState([]);
const [err, setErr] = useState(””);
const [guide, setGuide] = useState(false);
const [editIdx, setEditIdx] = useState(null);
const [addOpen, setAddOpen] = useState(false);
const fileRef = useRef();
const tmr = useRef();

useEffect(() => { const s = loadCtx(); if (s) setSavedCtx(s); }, []);

const applySaved = () => {
if (!savedCtx) return;
setForm(f=>({…f, groupNum:savedCtx.groupNum||””, school:savedCtx.school||””, period:savedCtx.period||””, extra:savedCtx.extra||””}));
setSavedCtx(null);
};

const handleFile = useCallback((file) => {
if (!file?.type.startsWith(“image/”)) { setErr(“Image uniquement (JPG, PNG, WebP).”); return; }
setImgMime(file.type);
const r = new FileReader();
r.onload = e => { const d=e.target.result; setImg64(d.split(”,”)[1]); setPreview(d); setStep(2); setErr(””); };
r.readAsDataURL(file);
}, []);

const analyze = async () => {
if (!img64) return;
saveCtx(form);
setErr(””); setLoading(true); setStep(3);
let i=0;
tmr.current = setInterval(()=>{ i=(i+1)%LOADER_MSGS.length; setLMsg(LOADER_MSGS[i]); },2000);
try {
const res = await fetch(“https://api.anthropic.com/v1/messages”, {
method:“POST”, headers:{“Content-Type”:“application/json”},
body: JSON.stringify({
model:“claude-sonnet-4-20250514”, max_tokens:4000,
system: buildPrompt(form),
messages:[{role:“user”,content:[
{type:“image”,source:{type:“base64”,media_type:imgMime,data:img64}},
{type:“text”,text:`Analyse cet emploi du temps en JSON.${form.groupNum?` Groupe: ${form.groupNum}`:""}`}
]}]
})
});
clearInterval(tmr.current);
if (!res.ok) { const e=await res.json(); throw new Error(`Erreur API ${res.status}: ${e.error?.message||JSON.stringify(e)}`); }
const data = await res.json();
const text = data.content.map(b=>b.text||””).join(””);
const m = text.match(/{[\s\S]*}/);
if (!m) throw new Error(“Réponse invalide de l’IA.”);
const evts = JSON.parse(m[0]).events||[];
if (!evts.length) throw new Error(“Aucun événement détecté. Essaie avec une image plus nette.”);
setEvents(evts); setStep(4);
} catch(e) {
clearInterval(tmr.current); setErr(e.message||String(e)); setStep(2);
} finally { setLoading(false); }
};

const downloadICS = () => {
const blob = new Blob([generateICS(events)],{type:“text/calendar;charset=utf-8”});
const a = Object.assign(document.createElement(“a”),{href:URL.createObjectURL(blob),download:“planning-plansync.ics”});
a.click();
};

const reset = () => { setStep(1);setImg64(null);setPreview(null);setEvents([]);setErr(””);setLoading(false);setForm(f=>({…f,startDate:””})); };

const STEPS = [“Image”,“Contexte”,“Analyse”,“Export”];
const iStyle = {width:“100%”,background:P.offwhite,border:`1.5px solid ${P.border}`,borderRadius:8,padding:“9px 12px”,color:P.textDark,fontFamily:“Arial,sans-serif”,fontSize:“0.82rem”,outline:“none”,boxSizing:“border-box”};
const blank = {title:“Nouveau créneau”,type:“CM”,date:””,startTime:“09:00”,endTime:“10:00”,location:””,description:””};

return (
<div style={{minHeight:“100vh”,background:P.bg,padding:“32px 16px 80px”}}>
<div style={{maxWidth:680,margin:“0 auto”}}>

```
    {/* Header */}
    <div style={{marginBottom:28,textAlign:"center"}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:10,marginBottom:14,background:P.white,borderRadius:50,padding:"8px 20px",boxShadow:"0 2px 12px rgba(184,169,240,0.2)",border:`1px solid ${P.border}`}}>
        <span style={{fontSize:"1.3rem"}}>📅</span>
        <span style={{fontWeight:800,fontSize:"1.1rem",color:P.lavenderD,letterSpacing:"-0.02em"}}>PlanSync</span>
      </div>
      <h1 style={{fontWeight:800,fontSize:"clamp(1.6rem,4vw,2.4rem)",lineHeight:1.15,letterSpacing:"-0.03em",color:P.textDark,marginBottom:10}}>
        Ton planning,{" "}
        <span style={{color:P.lavenderD}}>automatiquement</span>
        {" "}dans Google Agenda
      </h1>
      <p style={{color:P.textLight,fontSize:"0.85rem",lineHeight:1.7,maxWidth:480,margin:"0 auto"}}>
        Prends en photo ton emploi du temps → l'IA extrait tous tes cours, TD et examens → génère un fichier .ics à importer en 1 clic.
      </p>
    </div>

    {/* Steps */}
    <div style={{display:"flex",marginBottom:28,background:P.white,borderRadius:50,padding:"10px 16px",boxShadow:"0 2px 10px rgba(184,169,240,0.15)",border:`1px solid ${P.border}`}}>
      {STEPS.map((label,i)=>{
        const n=i+1,done=step>n,active=step===n;
        return <div key={n} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,position:"relative"}}>
          {i<STEPS.length-1 && <div style={{position:"absolute",top:11,left:"58%",width:"84%",height:2,background:done?P.lavenderD:P.border,transition:"background .4s",borderRadius:1}}/>}
          <div style={{width:22,height:22,borderRadius:"50%",background:done?P.lavenderD:active?P.lavender:P.border,color:done||active?"white":P.textLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.6rem",zIndex:1,fontWeight:700,transition:"all .3s",boxShadow:active?`0 0 0 3px ${P.bg}, 0 0 0 5px ${P.lavender}`:done?`0 0 0 3px ${P.bg}, 0 0 0 5px ${P.lavenderD}`:"none"}}>
            {done?"✓":n}
          </div>
          <span style={{fontSize:"0.56rem",color:active?P.lavenderD:P.textLight,textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:active?700:400}}>{label}</span>
        </div>;
      })}
    </div>

    {/* Upload + Context */}
    {!loading && step<4 && (
      <div className="fade-in" style={{background:P.white,borderRadius:16,padding:24,boxShadow:"0 4px 24px rgba(184,169,240,0.12)",border:`1px solid ${P.border}`,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:"0.92rem",color:P.textDark,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
          📸 Image du planning
          <span style={{fontSize:"0.62rem",padding:"2px 9px",borderRadius:20,background:P.bg,color:P.lavenderD,border:`1px solid ${P.lavender}`,fontWeight:600}}>ÉTAPE 1</span>
        </div>
        <p style={{fontSize:"0.78rem",color:P.textLight,marginBottom:16,lineHeight:1.6}}>Photo ou capture d'écran de ton emploi du temps · JPG, PNG, WebP</p>

        {!preview ? (
          <div
            onDragOver={e=>{e.preventDefault();setDrag(true);}}
            onDragLeave={()=>setDrag(false)}
            onDrop={e=>{e.preventDefault();setDrag(false);e.dataTransfer.files[0]&&handleFile(e.dataTransfer.files[0]);}}
            onClick={()=>fileRef.current.click()}
            style={{border:`2px dashed ${drag?P.lavenderD:P.border}`,borderRadius:12,padding:"40px 20px",textAlign:"center",cursor:"pointer",background:drag?P.bg:P.offwhite,transition:"all .2s"}}>
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
            <div style={{fontSize:"2.2rem",marginBottom:10}}>🖼️</div>
            <div style={{fontWeight:700,color:P.textDark,marginBottom:5}}>Clique ou glisse ton image ici</div>
            <div style={{fontSize:"0.74rem",color:P.textLight}}>JPG · PNG · WebP</div>
          </div>
        ) : (
          <div style={{position:"relative",borderRadius:10,overflow:"hidden",border:`1.5px solid ${P.border}`}}>
            <img src={preview} alt="planning" style={{width:"100%",maxHeight:220,objectFit:"contain",background:P.offwhite,display:"block"}}/>
            <button onClick={()=>{setImg64(null);setPreview(null);setStep(1);}} style={{position:"absolute",top:8,right:8,background:"rgba(255,255,255,.9)",border:`1px solid ${P.border}`,color:P.roseD,borderRadius:6,padding:"3px 10px",fontSize:"0.72rem",cursor:"pointer",fontWeight:700}}>✕</button>
          </div>
        )}

        {/* Saved context banner */}
        {savedCtx && preview && (
          <div style={{marginTop:14,background:"#EAF8F2",border:`1.5px solid ${P.mint}`,borderRadius:10,padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
            <div>
              <div style={{fontSize:"0.76rem",color:P.mintD,fontWeight:700,marginBottom:2}}>💾 Paramètres sauvegardés détectés</div>
              <div style={{fontSize:"0.7rem",color:P.textLight}}>{[savedCtx.groupNum&&`Groupe: ${savedCtx.groupNum}`,savedCtx.school].filter(Boolean).join(" · ")}</div>
            </div>
            <button onClick={applySaved} style={{background:P.mintD,border:"none",borderRadius:8,padding:"7px 13px",color:"white",fontSize:"0.74rem",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>Réutiliser →</button>
          </div>
        )}

        {/* Context fields */}
        {preview && (
          <div style={{marginTop:20}}>
            <div style={{fontWeight:700,fontSize:"0.84rem",color:P.textDark,marginBottom:12}}>⚙️ Contexte <span style={{fontWeight:400,fontSize:"0.74rem",color:P.textLight}}>(recommandé)</span></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              {[{id:"startDate",label:"Semaine de début",type:"date"},{id:"period",label:"Période",ph:"Ex: S2 2025-2026"},{id:"groupNum",label:"Mon groupe",ph:"Ex: 6/6 ou B3"},{id:"school",label:"Établissement",ph:"Ex: IFSI, AP-HP…"}].map(({id,label,type,ph})=>(
                <div key={id}>
                  <div style={{fontSize:"0.63rem",color:P.textLight,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>{label}</div>
                  <input type={type||"text"} value={form[id]} onChange={e=>setForm(f=>({...f,[id]:e.target.value}))} placeholder={ph||""} style={iStyle}/>
                </div>
              ))}
            </div>
            <div>
              <div style={{fontSize:"0.63rem",color:P.textLight,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>Infos supplémentaires</div>
              <textarea value={form.extra} onChange={e=>setForm(f=>({...f,extra:e.target.value}))} placeholder="Ex: orange = présentiel, vert = distanciel, les partiels sont en rouge…" style={{...iStyle,minHeight:62,resize:"vertical"}}/>
            </div>
          </div>
        )}

        <button onClick={analyze} disabled={!img64}
          style={{width:"100%",marginTop:18,padding:"14px",background:img64?P.lavenderD:"#E8E4F8",border:"none",borderRadius:10,color:img64?"white":P.textLight,fontWeight:700,fontSize:"0.92rem",cursor:img64?"pointer":"not-allowed",transition:"all .3s",boxShadow:img64?"0 4px 16px rgba(107,95,199,0.3)":"none"}}>
          ✦ Analyser avec l'IA
        </button>

        {err && (
          <div style={{marginTop:12,background:"#FFF0F4",border:`1.5px solid ${P.rose}`,borderRadius:10,padding:"12px 14px",fontSize:"0.78rem",color:P.roseD,lineHeight:1.6}}>
            ⚠ {err}
          </div>
        )}
      </div>
    )}

    {/* Loader */}
    {loading && (
      <div className="fade-in" style={{background:P.white,borderRadius:16,padding:48,textAlign:"center",boxShadow:"0 4px 24px rgba(184,169,240,0.12)",border:`1px solid ${P.border}`}}>
        <div style={{width:40,height:40,border:`3px solid ${P.border}`,borderTopColor:P.lavenderD,borderRadius:"50%",margin:"0 auto 20px",animation:"spin .9s linear infinite"}}/>
        <div style={{fontSize:"0.85rem",color:P.textMid,fontWeight:600}}>Analyse en cours…</div>
        <div style={{fontSize:"0.78rem",color:P.lavenderD,marginTop:8}}>{lMsg}</div>
      </div>
    )}

    {/* Results */}
    {step===4 && !loading && (
      <div className="fade-in" style={{background:P.white,borderRadius:16,padding:24,boxShadow:"0 4px 24px rgba(184,169,240,0.12)",border:`1px solid ${P.border}`}}>
        <div style={{fontWeight:700,fontSize:"0.92rem",color:P.textDark,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
          ✅ Événements détectés
          <span style={{fontSize:"0.62rem",padding:"2px 9px",borderRadius:20,background:"#EAF8F2",color:P.mintD,border:`1px solid ${P.mint}`,fontWeight:600}}>{events.length} événement{events.length>1?"s":""}</span>
        </div>
        <p style={{fontSize:"0.74rem",color:P.textLight,marginBottom:16}}>
          <span style={{color:P.lavenderD,fontWeight:600}}>✏️ modifier</span> · <span style={{color:P.roseD,fontWeight:600}}>✕ supprimer</span> · vérifie avant d'exporter
        </p>

        {/* Type legend */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {Object.entries(TYPE_STYLE).map(([t,s])=>{
            const count = events.filter(e=>e.type===t).length;
            if (!count) return null;
            return <div key={t} style={{display:"flex",alignItems:"center",gap:5,fontSize:"0.74rem",background:s.bg,border:`1px solid ${s.border}`,borderRadius:20,padding:"3px 10px"}}>
              <span>{s.icon}</span><b style={{color:s.text}}>{count}</b><span style={{color:P.textMid}}>{t}</span>
            </div>;
          })}
        </div>

        {/* Events list */}
        <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:380,overflowY:"auto",marginBottom:16,paddingRight:2}}>
          {events.map((ev,i)=>{
            const ts = TYPE_STYLE[ev.type]||TYPE_STYLE.CM;
            const dateStr = ev.date ? new Date(ev.date+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}) : "?";
            const timeStr = ev.startTime&&ev.endTime ? `${ev.startTime}–${ev.endTime}` : ev.startTime||"";
            return (
              <div key={i} style={{background:ts.bg,border:`1.5px solid ${ts.border}`,borderRadius:10,padding:"10px 13px",display:"grid",gridTemplateColumns:"auto 1fr auto",alignItems:"center",gap:11,transition:"box-shadow .2s"}}>
                <span style={{fontSize:"1rem"}}>{ts.icon}</span>
                <div style={{minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:"0.83rem",color:P.textDark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
                  <div style={{fontSize:"0.68rem",color:P.textMid,marginTop:2}}>{dateStr} · {timeStr}{ev.location?` · 📍${ev.location}`:""}</div>
                  {ev.description && <div style={{fontSize:"0.65rem",color:P.textLight,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.description}</div>}
                </div>
                <div style={{display:"flex",gap:5,flexShrink:0}}>
                  <button onClick={()=>setEditIdx(i)} style={{background:P.white,border:`1.5px solid ${P.lavender}`,color:P.lavenderD,cursor:"pointer",padding:"4px 8px",borderRadius:6,fontSize:"0.75rem",fontWeight:700}}>✏️</button>
                  <button onClick={()=>setEvents(evs=>evs.filter((_,j)=>j!==i))} style={{background:P.white,border:`1.5px solid ${P.rose}`,color:P.roseD,cursor:"pointer",padding:"4px 8px",borderRadius:6,fontSize:"0.75rem",fontWeight:700}}>✕</button>
                </div>
              </div>
            );
          })}
        </div>

        <button onClick={()=>setAddOpen(true)} style={{width:"100%",marginBottom:14,padding:"9px",background:"transparent",border:`1.5px dashed ${P.border}`,borderRadius:9,color:P.textLight,cursor:"pointer",fontSize:"0.8rem",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          + Ajouter un créneau manuellement
        </button>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button onClick={downloadICS} style={{padding:"13px",background:P.mintD,border:"none",borderRadius:10,color:"white",fontWeight:700,fontSize:"0.85rem",cursor:"pointer",boxShadow:"0 4px 14px rgba(58,140,106,0.3)"}}>⬇ Télécharger .ics</button>
          <button onClick={()=>setGuide(true)} style={{padding:"13px",background:P.offwhite,border:`1.5px solid ${P.border}`,borderRadius:10,color:P.textMid,fontWeight:700,fontSize:"0.85rem",cursor:"pointer"}}>📖 Guide import</button>
        </div>
        <button onClick={reset} style={{marginTop:10,background:"transparent",border:`1px solid ${P.border}`,color:P.textLight,fontSize:"0.74rem",padding:"7px 14px",borderRadius:8,cursor:"pointer",width:"100%"}}>↺ Nouvelle analyse</button>
      </div>
    )}

    {/* Footer */}
    <div style={{marginTop:28,textAlign:"center",fontSize:"0.72rem",color:P.textLight}}>
      PlanSync · IFSI Pitié-Salpêtrière · Promotion 2025-2028 · <a href="https://kalyT3.github.io/plansync" style="color:#B8A9F0">kalyT3.github.io/plansync</a>
    </div>
  </div>

  {editIdx!==null && <EditModal event={events[editIdx]} onSave={ev=>{setEvents(evs=>evs.map((e,i)=>i===editIdx?ev:e));setEditIdx(null);}} onClose={()=>setEditIdx(null)}/>}
  {addOpen && <EditModal event={blank} onSave={ev=>{setEvents(evs=>[...evs,ev]);setAddOpen(false);}} onClose={()=>setAddOpen(false)}/>}
  {guide && <GuideModal onClose={()=>setGuide(false)}/>}
</div>
```

);
}

ReactDOM.render(<PlanSync/>, document.getElementById(“root”));
</script>

</body>
</html>
